<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Helen</title>
	</head>
	<body>
		<div id="app" class="h-lvh w-full"></div>

		<!-- Fixed nav bar (becomes visible on scroll) -->
		<nav id="nav-bar" class="nav-bar">
			<span class="nav-name">Helen</span>
			<div class="nav-line"></div>
			<div class="nav-links">
				<a href="#about">About</a>
				<a href="#gallery">Gallery</a>
				<a href="#book">Book</a>
			</div>
		</nav>

		<!-- Hero section -->
		<section id="hero" class="hero">
			<div class="hero-inner">
				<div class="hero-left">
					<span class="hero-name">Helen</span>
					<div class="hero-tagline">Photographer</div>
				</div>
				<div class="hero-line hero-line-left"></div>
				<div class="hero-center">
					<div class="hero-portrait">
						<img src="helen-portrait.png" alt="Helen" />
					</div>
					<p class="hero-bio">Plants, animals &amp; humans&mdash;<br>the quiet moments in between.</p>
				</div>
				<div class="hero-line hero-line-right"></div>
				<div class="hero-right">
					<div class="hero-nav">
						<a href="#about">About</a>
						<a href="#gallery">Gallery</a>
						<a href="#book">Book</a>
					</div>
					<div class="hero-location">Based in Florida</div>
				</div>
			</div>
			<div class="hero-scroll-hint">
				<div class="hero-scroll-line"></div>
			</div>
		</section>

		<!-- Quote section (appears after cards) -->
		<section id="quote-section" class="quote-section">
			<div class="quote-inner">
				<p class="quote-text" data-quote>Every frame holds a world most people walk past without seeing.</p>
			</div>
		</section>

		<script type="module" src="/src/main.js"></script>
	</body>
</html>
